<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#059669" />
  <title>Gia Phai - Ho Toc Vi Viet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/family-chart@latest/dist/styles/family-chart.css" />
  <script type="module" src="https://unpkg.com/family-chart@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    .hidden { display: none !important; }

   /* Family Chart overrides */
    .f3-svg { background: #f9fafb !important; }
    .f3-card { cursor: pointer; }
    .f3-card:hover { filter: brightness(0.95); }
    .f3-card rect { rx: 12; ry: 12; }

    /* Smooth transitions */
    * { transition-property: transform, opacity; transition-duration: 150ms; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script type="module" src="js/app.js"></script>
