version: '3.8'

services:
  auth:
    build:
      context: ./auth          
    container_name: gia-pha-auth
    ports:
      - "8080:8080"            
    environment:
      - PROTO=http
      - HOST=localhost
      - PORT=:8080
    networks:
      - gia-pha-network
    restart: unless-stopped    

  auth-ui:
    build:
      context: ./auth-ui     
    container_name: gia-pha-auth-ui
    ports:
      - "8081:80"              
    networks:
      - gia-pha-network
    restart: unless-stopped

  prototype:
    build:
      context: ./prototype     
    container_name: gia-pha-prototype
    ports:
      - "8082:80"             
    networks:
      - gia-pha-network
    restart: unless-stopped

networks:
  gia-pha-network:
    driver: bridge
