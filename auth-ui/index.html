<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey</title>
    <link href="bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="bg-light p-5 rounded w-50">
        <h1 class="mb-4 text-center">🔑 Passkey</h1>
        <div class="text-center" id="message"></div>
        <ul class="nav nav-tabs mb-3" id="authTabs">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#registerTab">Register</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#loginTab">Login</a>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="registerTab">
                <div class="mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Enter your name, or leave it blank to use a random name.">
                </div>
                <button class="btn btn-primary w-100" id="registerButton">Register</button>
            </div>
            <div class="tab-pane fade" id="loginTab">
                <button class="btn btn-primary w-100" id="loginButton">Login</button>
            </div>
        </div>
    </div>
    <a href="/private">PRIVATE</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="index.es5.umd.min.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
